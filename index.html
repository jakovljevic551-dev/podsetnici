<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Podsetnici</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; max-width: 420px; margin: 0 auto; min-height: 100vh; }
  
  .header { background: #fff; padding: 20px 20px 14px; border-bottom: 0.5px solid rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  .header p { font-size: 13px; color: #666; margin-top: 2px; }
  
  .tabs { display: flex; background: #fff; padding: 0 16px; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
  .tab { flex: 1; padding: 12px 4px; font-size: 13px; font-weight: 500; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; color: #888; transition: all 0.15s; }
  .tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
  
  .section { padding: 16px; display: none; background: #f5f4f0; min-height: calc(100vh - 130px); }
  .section.active { display: block; }
  
  /* Voice tab */
  .mic-area { display: flex; flex-direction: column; align-items: center; padding: 28px 16px; gap: 16px; }
  .mic-btn { width: 88px; height: 88px; border-radius: 50%; background: #fff; border: 0.5px solid rgba(0,0,0,0.15); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  .mic-btn:hover { background: #f0efeb; }
  .mic-btn.recording { background: #fff0f0; border-color: #e04040; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(224,64,64,0.2)} 50%{box-shadow:0 0 0 14px rgba(224,64,64,0)} }
  
  .rec-status { font-size: 14px; color: #666; text-align: center; }
  .rec-status.recording { color: #c03030; font-weight: 500; }
  
  .transcript-box { width: 100%; background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 14px; font-size: 14px; color: #333; line-height: 1.5; display: none; }
  
  .ai-preview { width: 100%; background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 14px; display: none; }
  .ai-preview-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .ai-field { display: flex; justify-content: space-between; align-items: flex-start; padding: 7px 0; border-bottom: 0.5px solid rgba(0,0,0,0.07); gap: 8px; }
  .ai-field:last-child { border-bottom: none; }
  .ai-key { color: #888; font-size: 12px; flex-shrink: 0; }
  .ai-val { color: #1a1a1a; font-size: 12px; font-weight: 500; text-align: right; }
  
  .btn { width: 100%; padding: 13px; background: #fff; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; color: #1a1a1a; display: none; -webkit-tap-highlight-color: transparent; }
  .btn:hover { background: #f0efeb; }
  .btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn.primary:hover { background: #333; }
  
  .notif-banner { background: #eaf3de; border: 0.5px solid #c0dd97; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #3b6d11; display: none; margin-bottom: 12px; }
  
  /* Manual tab */
  .manual-form { background: #fff; border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 14px; border: 0.5px solid rgba(0,0,0,0.08); }
  .field-label { font-size: 12px; color: #888; margin-bottom: 6px; font-weight: 500; }
  textarea { width: 100%; resize: vertical; min-height: 90px; font-family: inherit; font-size: 14px; padding: 12px; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 10px; background: #fafaf8; color: #1a1a1a; line-height: 1.5; -webkit-appearance: none; }
  textarea:focus { outline: none; border-color: #1a1a1a; background: #fff; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  input[type=datetime-local], input[type=number] { font-family: inherit; font-size: 13px; padding: 10px 12px; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 10px; background: #fafaf8; color: #1a1a1a; width: 100%; -webkit-appearance: none; appearance: none; }
  input:focus { outline: none; border-color: #1a1a1a; }
  .add-btn { padding: 13px; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%; -webkit-tap-highlight-color: transparent; }
  .add-btn:hover { background: #333; }
  
  /* List tab */
  .reminders-list { display: flex; flex-direction: column; gap: 8px; }
  .reminder-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.08); border-radius: 14px; padding: 14px; }
  .reminder-card.done { opacity: 0.45; }
  .reminder-card.overdue { border-left: 3px solid #e04040; border-radius: 0 14px 14px 0; }
  
  .rc-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .rc-icon { width: 34px; height: 34px; border-radius: 50%; background: #f0efeb; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .rc-text { flex: 1; }
  .rc-title { font-size: 14px; font-weight: 500; color: #1a1a1a; line-height: 1.35; }
  .rc-time { font-size: 12px; color: #888; margin-top: 3px; }
  .rc-delete { background: none; border: none; cursor: pointer; color: #bbb; padding: 4px; flex-shrink: 0; }
  .rc-delete:hover { color: #e04040; }
  
  .rc-bottom { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 4px 9px; border-radius: 20px; font-weight: 500; }
  .badge-notif { background: #e6f1fb; color: #185fa5; }
  .badge-done { background: #eaf3de; color: #3b6d11; }
  .badge-overdue { background: #fcebeb; color: #a32d2d; }
  .done-btn { font-size: 12px; padding: 4px 11px; background: #f0efeb; border: none; border-radius: 20px; cursor: pointer; color: #555; margin-left: auto; font-weight: 500; }
  .done-btn:hover { background: #eaf3de; color: #3b6d11; }
  
  .empty-state { text-align: center; padding: 48px 16px; color: #999; font-size: 14px; line-height: 1.6; }
  
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ccc; border-top-color: #666; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .filter-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .filter-btn { font-size: 12px; padding: 6px 12px; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 20px; background: #fff; cursor: pointer; color: #555; font-weight: 500; }
  .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
</style>
</head>
<body>

<div class="header">
  <h1>Podsetnici</h1>
  <p id="reminder-count">0 aktivnih podsetnika</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('voice')">🎤 Glas</button>
  <button class="tab" onclick="switchTab('manual')">✏️ Ručno</button>
  <button class="tab" onclick="switchTab('list')">📋 Svi</button>
</div>

<div id="tab-voice" class="section active">
  <div id="notif-banner" class="notif-banner">✓ Notifikacije su aktivne — bićete obavešteni na vreme.</div>
  
  <div class="mic-area">
    <button class="mic-btn" id="mic-btn" onclick="toggleRecording()">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <div class="rec-status" id="rec-status">Pritisnite da snimite glasovnu poruku</div>
    
    <div class="transcript-box" id="transcript-box"></div>
    
    <div class="ai-preview" id="ai-preview">
      <div class="ai-preview-label">AI je parsirao podsetnik</div>
      <div id="ai-fields"></div>
    </div>
    
    <button class="btn" id="process-btn" onclick="processWithAI()">Analiziraj sa AI →</button>
    <button class="btn primary" id="add-voice-btn" onclick="addFromVoice()" style="display:none;">Dodaj podsetnik</button>
  </div>
</div>

<div id="tab-manual" class="section">
  <div class="manual-form">
    <div>
      <div class="field-label">Šta treba uraditi?</div>
      <textarea id="manual-task" placeholder="npr. Pozvati Peđu, Otići kod doktora, Platiti račun..."></textarea>
    </div>
    <div class="row2">
      <div>
        <div class="field-label">Datum i vreme zadatka</div>
        <input type="datetime-local" id="manual-time" />
      </div>
      <div>
        <div class="field-label">Notifikacija pre (min)</div>
        <input type="number" id="manual-notif" value="120" min="0" step="5" placeholder="120" />
      </div>
    </div>
    <button class="add-btn" onclick="addManualReminder()">Dodaj podsetnik</button>
  </div>
</div>

<div id="tab-list" class="section">
  <div class="filter-row">
    <button class="filter-btn active" id="f-all" onclick="setFilter('all')">Svi</button>
    <button class="filter-btn" id="f-active" onclick="setFilter('active')">Aktivni</button>
    <button class="filter-btn" id="f-done" onclick="setFilter('done')">Urađeni</button>
  </div>
  <div class="reminders-list" id="reminders-list">
    <div class="empty-state">Nema podsetnika još.<br>Dodajte glasovnim ili ručnim unosom.</div>
  </div>
</div>

<script>
let reminders = [];
let isRecording = false;
let mediaRec = null;
let audioChunks = [];
let parsedReminder = null;
let currentFilter = 'all';
const API_KEY = '';

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['voice','manual','list'][i]===name));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='list') renderList();
}

function setFilter(f) {
  currentFilter = f;
  ['all','active','done'].forEach(x => document.getElementById('f-'+x).classList.toggle('active', x===f));
  renderList();
}

async function requestNotif() {
  if(!('Notification' in window)) return;
  if(Notification.permission === 'granted') { document.getElementById('notif-banner').style.display = 'block'; return; }
  const p = await Notification.requestPermission();
  if(p === 'granted') document.getElementById('notif-banner').style.display = 'block';
}
requestNotif();

async function toggleRecording() {
  if(isRecording) { mediaRec && mediaRec.stop(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRec = new MediaRecorder(stream);
    audioChunks = [];
    mediaRec.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
    mediaRec.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      handleAudio();
    };
    mediaRec.start();
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-btn').innerHTML = `<svg width="30" height="30" viewBox="0 0 24 24" fill="#e04040" stroke="#e04040" stroke-width="1.5"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>`;
    document.getElementById('rec-status').textContent = 'Snimanje... pritisnite za kraj';
    document.getElementById('rec-status').classList.add('recording');
    document.getElementById('transcript-box').style.display = 'none';
    document.getElementById('ai-preview').style.display = 'none';
    document.getElementById('process-btn').style.display = 'none';
    document.getElementById('add-voice-btn').style.display = 'none';
  } catch(e) {
    document.getElementById('rec-status').textContent = 'Mikrofon nije dostupan. Koristite ručni unos.';
  }
}

async function handleAudio() {
  isRecording = false;
  document.getElementById('mic-btn').classList.remove('recording');
  document.getElementById('mic-btn').innerHTML = `<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`;
  document.getElementById('rec-status').innerHTML = '<span class="spinner"></span>Obrada snimka...';
  document.getElementById('rec-status').classList.remove('recording');
  
  const blob = new Blob(audioChunks, {type: audioChunks[0]?.type || 'audio/webm'});
  
  // Convert to base64
  const reader = new FileReader();
  reader.onload = async () => {
    const base64 = reader.result.split(',')[1];
    const mimeType = blob.type || 'audio/webm';
    
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: [
              { type: 'document', source: { type: 'base64', media_type: mimeType, data: base64 } },
              { type: 'text', text: 'Transkribuj ovu glasovnu poruku na srpskom jeziku. Vrati SAMO transkript, ništa drugo.' }
            ]
          }]
        })
      });
      
      const data = await res.json();
      const text = data.content?.[0]?.text?.trim() || '';
      
      const tb = document.getElementById('transcript-box');
      tb.style.display = 'block';
      tb.textContent = text || '(prazan snimak)';
      
      if(text) {
        const pb = document.getElementById('process-btn');
        pb.style.display = 'block';
        pb.dataset.text = text;
        document.getElementById('rec-status').textContent = 'Transkript gotov — analizirajte sa AI';
      } else {
        document.getElementById('rec-status').textContent = 'Snimak obrađen';
      }
    } catch(e) {
      document.getElementById('rec-status').textContent = 'Greška. Pokušajte ponovo ili koristite ručni unos.';
    }
  };
  reader.readAsDataURL(blob);
}

async function processWithAI() {
  const text = document.getElementById('process-btn').dataset.text;
  document.getElementById('process-btn').innerHTML = '<span class="spinner"></span>AI analizira...';
  document.getElementById('process-btn').disabled = true;
  
  const today = new Date();
  const dateStr = today.toLocaleDateString('sr-RS', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  const timeStr = today.toLocaleTimeString('sr-RS', {hour:'2-digit', minute:'2-digit'});
  
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        messages: [{
          role: 'user',
          content: `Izvuci informacije o podsetniku iz sledeće poruke na srpskom. Vrati SAMO JSON bez ikakvog teksta oko njega, bez markdown oznaka:
{"task":"šta treba uraditi - kratko i jasno","datetime":"YYYY-MM-DDTHH:MM","notif_minutes_before":broj}

Pravila:
- datetime: ako se pominje dan u sedmici, nađi sledeći takav dan. Ako kaže "sutra" dodaj 1 dan. Ako nema datuma, koristi sledeću sedmicu.
- notif_minutes_before: ako kaže "2h ranije"=120, "30 min ranije"=30, "sat ranije"=60. Ako nije navedeno=30.

Danas je: ${dateStr}, ${timeStr}
Poruka: "${text}"`
        }]
      })
    });
    
    const data = await res.json();
    let raw = data.content?.[0]?.text || '{}';
    raw = raw.replace(/```json|```/g, '').trim();
    parsedReminder = JSON.parse(raw);
    showAIPreview(parsedReminder);
  } catch(e) {
    document.getElementById('rec-status').textContent = 'Greška pri analizi. Pokušajte ponovo.';
  }
  
  document.getElementById('process-btn').innerHTML = 'Analiziraj sa AI →';
  document.getElementById('process-btn').disabled = false;
}

function showAIPreview(r) {
  const dt = new Date(r.datetime);
  const notifDt = new Date(dt.getTime() - r.notif_minutes_before * 60000);
  const fmt = d => isNaN(d) ? '—' : d.toLocaleString('sr-RS', {weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
  
  document.getElementById('ai-fields').innerHTML = `
    <div class="ai-field"><span class="ai-key">Zadatak</span><span class="ai-val">${r.task}</span></div>
    <div class="ai-field"><span class="ai-key">Vreme</span><span class="ai-val">${fmt(dt)}</span></div>
    <div class="ai-field"><span class="ai-key">Notifikacija</span><span class="ai-val">${fmt(notifDt)}</span></div>
    <div class="ai-field"><span class="ai-key">Upozorenje pre</span><span class="ai-val">${r.notif_minutes_before} min</span></div>
  `;
  
  document.getElementById('ai-preview').style.display = 'block';
  document.getElementById('process-btn').style.display = 'none';
  document.getElementById('add-voice-btn').style.display = 'block';
  document.getElementById('rec-status').textContent = 'Proverite i potvrdite podsetnik';
}

function addFromVoice() {
  if(!parsedReminder) return;
  addReminder(parsedReminder.task, parsedReminder.datetime, parseInt(parsedReminder.notif_minutes_before) || 30);
  document.getElementById('ai-preview').style.display = 'none';
  document.getElementById('add-voice-btn').style.display = 'none';
  document.getElementById('transcript-box').style.display = 'none';
  document.getElementById('rec-status').textContent = '✓ Podsetnik dodat! Pritisnite za novi snimak.';
  parsedReminder = null;
}

function addManualReminder() {
  const task = document.getElementById('manual-task').value.trim();
  const time = document.getElementById('manual-time').value;
  const mins = parseInt(document.getElementById('manual-notif').value) || 30;
  if(!task) { alert('Unesite šta treba uraditi.'); return; }
  if(!time) { alert('Izaberite datum i vreme.'); return; }
  addReminder(task, time, mins);
  document.getElementById('manual-task').value = '';
  document.getElementById('manual-time').value = '';
  document.getElementById('manual-notif').value = '120';
  switchTab('list');
}

function addReminder(task, datetime, notifMins) {
  const id = Date.now();
  const dt = new Date(datetime);
  const notifDt = new Date(dt.getTime() - notifMins * 60000);
  reminders.push({ id, task, datetime: dt.toISOString(), notifDatetime: notifDt.toISOString(), notifMins, done: false, source: 'app' });
  saveReminders();
  updateCount();
  scheduleNotif(task, notifDt, dt);
}

function scheduleNotif(task, notifDt, taskDt) {
  const ms = notifDt.getTime() - Date.now();
  if(ms > 0 && ms < 7 * 86400 * 1000) {
    setTimeout(() => {
      if(Notification.permission === 'granted') {
        new Notification('⏰ ' + task, {
          body: 'Za ' + taskDt.toLocaleString('sr-RS', {hour:'2-digit', minute:'2-digit'}) + ' — pritisnite da vidite podsetnike',
          tag: 'reminder'
        });
      }
    }, ms);
  }
}

function renderList() {
  const el = document.getElementById('reminders-list');
  let filtered = [...reminders];
  if(currentFilter === 'active') filtered = filtered.filter(r => !r.done);
  if(currentFilter === 'done') filtered = filtered.filter(r => r.done);
  
  if(!filtered.length) {
    el.innerHTML = '<div class="empty-state">Nema podsetnika.<br>Dodajte glasovnim ili ručnim unosom.</div>';
    return;
  }
  
  const sorted = filtered.sort((a,b) => new Date(a.datetime) - new Date(b.datetime));
  const now = new Date();
  
  el.innerHTML = sorted.map(r => {
    const dt = new Date(r.datetime);
    const ndt = new Date(r.notifDatetime);
    const overdue = !r.done && dt < now;
    const fmt = d => d.toLocaleString('sr-RS', {weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
    
    return `<div class="reminder-card${r.done?' done':''}${overdue?' overdue':''}">
      <div class="rc-top">
        <div class="rc-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </div>
        <div class="rc-text">
          <div class="rc-title">${r.task}</div>
          <div class="rc-time">${fmt(dt)}</div>
        </div>
        <button class="rc-delete" onclick="deleteReminder(${r.id})" title="Obriši">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="rc-bottom">
        <span class="badge badge-notif">🔔 ${fmt(ndt)}</span>
        ${overdue ? '<span class="badge badge-overdue">Prošlo</span>' : ''}
        ${r.done ? '<span class="badge badge-done">✓ Urađeno</span>' : `<button class="done-btn" onclick="markDone(${r.id})">Urađeno ✓</button>`}
      </div>
    </div>`;
  }).join('');
}

function markDone(id) { const r = reminders.find(x => x.id === id); if(r) r.done = true; saveReminders(); renderList(); updateCount(); }
function deleteReminder(id) { if(!confirm('Obrisati ovaj podsetnik?')) return; reminders = reminders.filter(x => x.id !== id); saveReminders(); renderList(); updateCount(); }
function updateCount() { const n = reminders.filter(r => !r.done).length; document.getElementById('reminder-count').textContent = n + ' aktiv' + (n===1?'an':'nih') + ' podsetnik' + (n===1?'':n<5?'a':'a'); }

function saveReminders() { try { localStorage.setItem('podsetnici_v2', JSON.stringify(reminders)); } catch(e) {} }
function loadReminders() { try { const d = localStorage.getItem('podsetnici_v2'); if(d) reminders = JSON.parse(d); } catch(e) { reminders = []; } updateCount(); }

loadReminders();

document.getElementById('manual-time').value = def.toISOString().slice(0,16);
